<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marginalia — Margins are where thinking happens</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    Type system (target): Fraunces (serif body+display) · IBM Plex Mono (labels) · Bodoni Moda (covers only)
    Cormorant / Libre Caslon / Inter are still loaded only because preloader book data references them
    on individual covers. Migrate book schema to use the 3-font system, then drop these three.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..800,0..100;1,9..144,300..800,0..100&family=IBM+Plex+Mono:wght@300;400;500&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&family=Caveat:wght@500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/core/base.css">
  <link rel="stylesheet" href="src/preloader/preloader.css">
  <link rel="stylesheet" href="src/shelf/shelf.css">
  <link rel="stylesheet" href="src/studio/studio.css">
  <link rel="stylesheet" href="src/booklist/booklist.css">
  <link rel="stylesheet" href="src/book/book.css">
  <link rel="stylesheet" href="src/map/map.css">
  <link rel="stylesheet" href="src/core/auth.css">
  <link rel="stylesheet" href="src/core/concept-ui.css">
  <link rel="stylesheet" href="src/web/web.css">
  <link rel="stylesheet" href="src/new-entry/new-entry.css">

  <!-- amCharts (used by map view) — loaded eagerly so first visit boots fast -->
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/chinaHigh.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <svg aria-hidden="true" width="0" height="0" style="position:absolute; width:0; height:0; overflow:hidden;">
    <symbol id="icon-nav-shelf" viewBox="0 0 16 16">
      <rect x="1.5" y="2" width="3" height="12" rx="0.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="6.5" y="2" width="3" height="12" rx="0.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="11.5" y="2" width="3" height="12" rx="0.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
    </symbol>
    <symbol id="icon-nav-map" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <path d="M2.2 8h11.6M8 2.1c2 1.8 2 10 0 11.8M8 2.1c-2 1.8-2 10 0 11.8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-nav-library" viewBox="0 0 16 16">
      <rect x="1.8" y="2.2" width="4.1" height="11.6" rx="0.7" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <rect x="6.8" y="5" width="3.8" height="8.8" rx="0.6" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <rect x="11.5" y="3.2" width="2.7" height="10.6" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
    </symbol>
    <symbol id="icon-nav-graph" viewBox="0 0 16 16">
      <circle cx="3" cy="3" r="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <circle cx="13" cy="4" r="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <circle cx="9" cy="13" r="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <path d="M4.2 3.6 11.7 4.2M12.1 5.2 9.7 11.7M4 4.2 8.1 11.7" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-nav-list" viewBox="0 0 16 16">
      <path d="M2.1 3.6 3 4.6 4.5 3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2.1 8 3 9 4.5 7.4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2.1 12.3 3 13.3 4.5 11.7" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6.2 3.8h7.2M6.2 8.2h7.2M6.2 12.5h7.2" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
  </svg>

  <!-- ============================================================
       VIEW: PRELOADER
       ============================================================ -->
  <div id="view-preloader" class="theme-ink">

    <header class="masthead">
      <a class="chapter" href="#" id="preloaderWordmark">Marginalia</a>
    </header>

    <div class="headline-wrap">
      <h1 class="headline">Marginalia</h1>
      <div class="headline-sub">Margins are where thinking happens.</div>
    </div>

    <main class="stage">
      <div class="viewport">
        <div class="track" id="track"></div>
      </div>
    </main>

    <div class="loader-meta" id="loaderMeta">
      <span class="dot"></span>
      <span id="loaderLabel">Reviewing the collection</span>
    </div>

    <button class="skip"          id="skipBtn">Skip</button>
    <button class="tweaks-toggle" id="tweaksToggle">Tweaks</button>

    <div class="tweaks" id="tweaksPanel">
      <h3>Tweaks <small>Marginalia</small></h3>
      <div class="tweak-row">
        <label>Animation speed <span class="num" id="speedNum">0.8×</span></label>
        <input type="range" id="speedSlider" min="0.4" max="2.0" step="0.1" value="1.0">
      </div>
      <div class="tweak-row">
        <label>Swing intensity <span class="num" id="swingNum">100%</span></label>
        <input type="range" id="swingSlider" min="30" max="180" step="5" value="100">
      </div>
      <div class="tweak-row">
        <label>Background</label>
        <div class="row-flex" id="themeRow">
          <div class="swatch"        data-theme="taupe" style="background:#b8ad9e"></div>
          <div class="swatch"        data-theme="cream" style="background:#e8dfc8"></div>
          <div class="swatch"        data-theme="sage"  style="background:#aab39a"></div>
          <div class="swatch"        data-theme="clay"  style="background:#c89f85"></div>
          <div class="swatch active" data-theme="ink"   style="background:#2a2824"></div>
        </div>
      </div>
      <div class="tweak-row">
        <label>Book palette</label>
        <div class="row-flex" id="paletteRow">
          <button class="chip active" data-palette="editorial">Editorial</button>
          <button class="chip"        data-palette="jewel">Jewel</button>
          <button class="chip"        data-palette="mono">Mono</button>
        </div>
      </div>
    </div>

  </div><!-- /view-preloader -->


  <!-- ============================================================
       VIEW: SHELF
       ============================================================ -->
  <div id="view-shelf" hidden>
  <div class="page">

    <header class="app-masthead">
      <div>
        <div class="wordmark">Marginalia</div>
        <span class="wordmark-sub">Margins are where thinking happens</span>
      </div>
      <nav class="nav">
        <a href="#shelf"    class="nav-link active" data-view="shelf"><span class="nav-icon" aria-hidden="true"><svg class="nav-icon-svg" viewBox="0 0 16 16" focusable="false"><use href="#icon-nav-shelf"></use></svg></span>Shelf</a>
        <a href="#studio"   class="nav-link"        data-view="studio"><span class="nav-icon" aria-hidden="true"><svg class="nav-icon-svg" viewBox="0 0 16 16" focusable="false"><use href="#icon-nav-library"></use></svg></span>Library</a>
        <a href="#map"      class="nav-link"        data-view="map"><span class="nav-icon" aria-hidden="true"><svg class="nav-icon-svg" viewBox="0 0 16 16" focusable="false"><use href="#icon-nav-map"></use></svg></span>Map</a>
        <a href="#web"      class="nav-link"        data-view="web"><span class="nav-icon" aria-hidden="true"><svg class="nav-icon-svg" viewBox="0 0 16 16" focusable="false"><use href="#icon-nav-graph"></use></svg></span>Graph</a>
        <a href="#booklist" class="nav-link"        data-view="booklist"><span class="nav-icon" aria-hidden="true"><svg class="nav-icon-svg" viewBox="0 0 16 16" focusable="false"><use href="#icon-nav-list"></use></svg></span>Booklist</a>
        <button class="nav-action-btn" id="shelfNewEntryBtn"><span class="nav-icon">＋</span>Add Book</button>
        <button class="auth-avatar-btn" type="button" data-auth-trigger aria-label="Open login panel" hidden>
          <span class="auth-avatar" data-auth-avatar aria-hidden="true">L</span>
        </button>
      </nav>
    </header>

    <div class="shelf-stats-bar" id="shelfStatsBar">
      <div class="shelf-stat">
        <span class="shelf-stat-label">Books Finished</span>
        <div class="shelf-stat-value-row">
          <span class="shelf-stat-num" id="statBooksFinished">—</span>
          <span class="shelf-stat-year" id="statBooksYear"></span>
        </div>
        <span class="shelf-stat-sub" id="statBooksVsLastYear"></span>
      </div>
      <div class="shelf-stat">
        <span class="shelf-stat-label">Reading Now</span>
        <div class="shelf-stat-value-row">
          <span class="shelf-stat-num" id="statReadingCount">—</span>
          <span class="shelf-stat-year">book</span>
        </div>
        <span class="shelf-stat-sub" id="statReadingTitle"></span>
      </div>
      <div class="shelf-stat">
        <span class="shelf-stat-label">Highlights Saved</span>
        <div class="shelf-stat-value-row">
          <span class="shelf-stat-num" id="statHighlights">—</span>
        </div>
        <span class="shelf-stat-sub" id="statHighlightsSub"></span>
      </div>
      <div class="shelf-stat">
        <span class="shelf-stat-label">Actions Completed</span>
        <div class="shelf-stat-value-row">
          <span class="shelf-stat-num" id="statActionsDone">—</span>
          <span class="shelf-stat-year">done</span>
        </div>
        <span class="shelf-stat-sub" id="statActionsPending"></span>
      </div>
    </div>

    <section id="shelf" class="shelf-section">
      <div class="section-head">
        <label class="section-subtitle shelf-search-label" for="shelfSearchInput">Search</label>
        <span class="count" id="shelfCount">0 books</span>
      </div>
      <div class="shelf-layout">
        <div class="shelf-stack-panel">
          <div class="shelf-tools">
            <div class="shelf-filters">
              <button class="chip active">All</button>
              <button class="chip">Finished</button>
              <button class="chip">Reading</button>
              <button class="chip">To Read</button>
            </div>
            <div class="shelf-search">
              <input id="shelfSearchInput" type="search" placeholder="Title, author, tag">
            </div>
          </div>
          <div class="shelf-stack" id="shelfStack"></div>
        </div>
        <aside class="shelf-preview-panel" id="shelfPreviewPanel">
          <button class="shelf-preview-close" id="shelfPreviewCloseBtn" type="button" aria-label="Close preview">×</button>
          <div class="shelf-preview-cover" id="shelfPreviewCoverFrame">
            <img id="shelfPreviewCover" alt="Selected book cover" hidden>
            <div class="shelf-preview-fallback" id="shelfPreviewFallback"></div>
          </div>
          <div class="shelf-preview-meta">
            <h3 id="shelfPreviewTitle"></h3>
            <p class="preview-subtitle" id="shelfPreviewSubtitle"></p>
            <p class="preview-author" id="shelfPreviewAuthor"></p>
            <div class="preview-stats" id="shelfPreviewStats"></div>
            <p class="preview-description" id="shelfPreviewDescription"></p>
            <div class="preview-tags" id="shelfPreviewTags"></div>
          </div>
        </aside>
      </div>
      <section class="shelf-deep-panel" id="shelfDeepPanel" hidden></section>
      <section class="shelf-action-panel" id="shelfActionPanel" hidden></section>
    </section>

  </div>
  </div><!-- /view-shelf -->

  <!-- ============================================================
       VIEW: SHELF STUDIO
       ============================================================ -->
  <div id="view-studio" hidden></div>


  <!-- ============================================================
       VIEW: BOOK (single-book detail) — populated in step 2
       ============================================================ -->
  <div id="view-book" hidden></div>

  <!-- ============================================================
       VIEW: MAP (reading map) — populated in step 4
       ============================================================ -->
  <div id="view-map" hidden></div>

  <!-- ============================================================
       VIEW: WEB (concept web)
       ============================================================ -->
  <div id="view-web" hidden></div>

  <!-- ============================================================
       VIEW: BOOKLIST
       ============================================================ -->
  <div id="view-booklist" hidden></div>


  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- 1. Schema + type system (load first — everything else reads from these) -->
  <script src="src/data/schema/book-types.js"></script>      <!-- window.BOOK_TYPES, window.BookTypes -->
  <script src="src/book/panels/registry.js"></script>        <!-- window.PanelRegistry -->
  <script src="src/ai/features/registry.js"></script>        <!-- window.AIFeatureRegistry -->

  <!-- 1b. Mock / seed data (replace with real API adapters when ready) -->
  <script src="src/data/mock/seed-spines.js"></script>       <!-- window.BOOKS, window.SHELF_BOOKS -->
  <script src="src/data/mock/curated-booklist.js"></script>  <!-- window.BOOKLIST_CURATED -->
  <script src="src/data/seed/sapiens.js"></script>           <!-- window.__SEED_SAPIENS -->
  <script src="src/data/seed/index.js"></script>             <!-- window.BOOK_DETAILS, BOOK_BY_ID -->

  <!-- 2. Firebase layer (config → auth → db) -->
  <script src="src/firebase/config.js"></script>
  <script src="src/firebase/auth.js"></script>
  <script src="src/firebase/db.js"></script>

  <!-- 3. State stores -->
  <script src="src/store/books-store.js"></script>
  <script src="src/store/notes-store.js"></script>

  <!-- 4. Core app utilities -->
  <script src="src/core/graph-data.js"></script>
  <script src="src/core/app.js"></script>
  <script src="src/core/concept-ui.js"></script>

  <!-- 4b. API adapters -->
  <script src="src/api/kindle-import.js"></script>

  <!-- 5. Shared components -->
  <script src="src/components/spine-card.js"></script>
  <script src="src/new-entry/new-entry.js"></script>

  <!-- 6. Views -->
  <script src="src/preloader/preloader.js"></script>
  <script src="src/shelf/shelf.js"></script>
  <script src="src/studio/studio.js"></script>
  <script src="src/booklist/booklist.js"></script>
  <script src="src/book/book.js"></script>
  <script src="src/map/map.js"></script>
  <script src="src/web/web.js"></script>
  <script type="module" src="src/preloader/hero-glb.js"></script>

</body>
</html>
